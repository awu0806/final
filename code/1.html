<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8" />
            <title>Bones</title>
            <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
            <style>
                body { margin: 0; overflow: hidden; }
                button { position: absolute; top: 20px; left: 20px; z-index: 2; }
            </style>
        </head>
        <body>
            <a-scene
            mindar-image="
                imageTargetSrc: bone1.mind;
                autoStart: true;
                uiLoading: true;
                uiScanning: true;
                uiError: true;
            "
            color-space="sRGB"
            renderer="colorManagement: true, physicallyCorrectLights: true"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            >
                <a-assets>
                    <img id="head" src="bone1word.jpg" />
                </a-assets>
                <a-light type="ambient" intensity="3"></a-light>
                <a-camera look-controls="enabled: false"></a-camera>
                <a-entity mindar-image-target="targetIndex: 0" id="bone1">
                    <a-plane src="#head" width="1.0" height="auto" position="0 0 0"></a-plane>
                </a-entity>
            </a-scene>
            <a-scene
            mindar-image="
                imageTargetSrc: bone2.mind;
                autoStart: true;
                uiLoading: true;
                uiScanning: true;
                uiError: true;
            "
            color-space="sRGB"
            renderer="colorManagement: true, physicallyCorrectLights: true"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            >
                <a-assets>
                    <img id="shoulder" src="bone2word.jpg" />
                </a-assets>
                <a-light type="ambient" intensity="3"></a-light>
                <a-camera look-controls="enabled: false"></a-camera>
                <a-entity mindar-image-target="targetIndex: 1" id="bone2">
                    <a-plane src="#shoulder" width="1.0" height="auto" position="0 0 0"></a-plane>
                </a-entity>
            </a-scene>
        </body>
    </html>
